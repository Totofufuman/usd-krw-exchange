<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USD/KRW 실시간 환율</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0b0e;
            --card: #12141a;
            --border: #1e2130;
            --text: #f0f0f3;
            --dim: #6b7080;
            --blue: #4f8ff7;
            --green: #00d26a;
            --red: #ff4757;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 20px;
        }

        .container { max-width: 800px; width: 100%; }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 13px;
            font-weight: 500;
            color: var(--dim);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .header .pair {
            font-size: 20px;
            font-weight: 600;
        }

        /* Price widget card */
        .price-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
        }

        .price-card .tradingview-widget-container {
            margin: 0 !important;
        }

        /* Interval buttons */
        .intervals {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .intervals button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--dim);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .intervals button:hover {
            background: #1a1d26;
            color: var(--text);
        }

        .intervals button.active {
            background: var(--blue);
            border-color: var(--blue);
            color: #fff;
        }

        /* Chart card */
        .chart-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 24px;
            position: relative;
        }

        .chart-wrap {
            height: 460px;
            position: relative;
        }

        .chart-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card);
            z-index: 10;
            transition: opacity 0.4s;
        }

        .chart-loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 24px; height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .footer {
            text-align: center;
            color: var(--dim);
            font-size: 12px;
            line-height: 1.8;
        }

        .pulse {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--green);
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

        /* TradingView branding link style override */
        .tradingview-widget-copyright {
            font-size: 11px !important;
        }

        .tradingview-widget-copyright a {
            color: var(--dim) !important;
            text-decoration: none !important;
        }

        @media (max-width: 480px) {
            body { padding: 16px 10px; }
            .intervals button { padding: 6px 11px; font-size: 12px; }
            .chart-wrap { height: 350px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>실시간 환율</h1>
            <div class="pair">USD / KRW</div>
        </div>

        <!-- Real-time price + change + mini chart (TradingView Symbol Overview) -->
        <div class="price-card">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
                {
                    "symbols": [["USD/KRW", "FX_IDC:USDKRW|1D"]],
                    "chartOnly": false,
                    "width": "100%",
                    "height": 220,
                    "locale": "kr",
                    "colorTheme": "dark",
                    "autosize": false,
                    "showVolume": false,
                    "showMA": false,
                    "hideDateRanges": true,
                    "hideMarketStatus": false,
                    "hideSymbolLogo": true,
                    "scalePosition": "no",
                    "scaleMode": "Normal",
                    "fontFamily": "-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif",
                    "fontSize": "10",
                    "noTimeScale": true,
                    "valuesTracking": "1",
                    "changeMode": "price-and-percent",
                    "chartType": "area",
                    "lineWidth": 2,
                    "lineColor": "rgba(79, 143, 247, 1)",
                    "topColor": "rgba(79, 143, 247, 0.3)",
                    "bottomColor": "rgba(79, 143, 247, 0.02)",
                    "backgroundColor": "rgba(18, 20, 26, 1)",
                    "gridLineColor": "rgba(255, 255, 255, 0.03)",
                    "isTransparent": false
                }
                </script>
            </div>
        </div>

        <!-- Interval buttons -->
        <div class="intervals" id="intervals">
            <button data-tv="1">1시간</button>
            <button data-tv="5">4시간</button>
            <button data-tv="15">6시간</button>
            <button data-tv="30">12시간</button>
            <button data-tv="60" class="active">1일</button>
            <button data-tv="240">7일</button>
            <button data-tv="D">1개월</button>
        </div>

        <!-- Detailed chart (TradingView Advanced Chart) -->
        <div class="chart-card">
            <div class="chart-wrap" id="tvChartWrap">
                <div class="chart-loading" id="chartLoading">
                    <div class="spinner"></div>
                </div>
                <div id="tvChart" style="width:100%;height:100%;"></div>
            </div>
        </div>

        <div class="footer">
            <div><span class="pulse"></span>실시간 시장 데이터</div>
            <div>Powered by TradingView</div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        const INTERVAL_RANGES = {
            '1':   undefined,
            '5':   undefined,
            '15':  undefined,
            '30':  '1D',
            '60':  '1D',
            '240': '5D',
            'D':   '1M'
        };

        let currentInterval = '60';
        let tvReady = false;

        /* ── TradingView Advanced Chart ── */
        function createChart(interval) {
            const container = document.getElementById('tvChart');
            container.innerHTML = '';

            const loading = document.getElementById('chartLoading');
            loading.classList.remove('hidden');

            const config = {
                autosize: true,
                symbol: 'FX_IDC:USDKRW',
                interval: interval,
                timezone: 'Asia/Seoul',
                theme: 'dark',
                style: '3',
                locale: 'kr',
                enable_publishing: false,
                allow_symbol_change: false,
                hide_top_toolbar: true,
                hide_side_toolbar: true,
                hide_legend: false,
                save_image: false,
                container_id: 'tvChart',
                withdateranges: false,
                details: false,
                calendar: false,
                backgroundColor: 'rgba(18, 20, 26, 1)',
                gridLineColor: 'rgba(255, 255, 255, 0.03)',
                overrides: {
                    'paneProperties.background': '#12141a',
                    'paneProperties.backgroundType': 'solid',
                    'paneProperties.vertGridProperties.color': 'rgba(255,255,255,0.03)',
                    'paneProperties.horzGridProperties.color': 'rgba(255,255,255,0.03)',
                    'mainSeriesProperties.areaStyle.linecolor': '#4f8ff7',
                    'mainSeriesProperties.areaStyle.linewidth': 2,
                    'mainSeriesProperties.areaStyle.color1': 'rgba(79,143,247,0.28)',
                    'mainSeriesProperties.areaStyle.color2': 'rgba(79,143,247,0.02)',
                    'mainSeriesProperties.areaStyle.transparency': 50,
                    'scalesProperties.textColor': '#6b7080',
                    'scalesProperties.lineColor': 'rgba(255,255,255,0.05)'
                }
            };

            const range = INTERVAL_RANGES[interval];
            if (range) {
                config.range = range;
            }

            try {
                new TradingView.widget(config);
                setTimeout(function () { loading.classList.add('hidden'); }, 1500);
            } catch (err) {
                loading.innerHTML = '<span style="color:#6b7080;">차트를 불러올 수 없습니다</span>';
            }
        }

        /* ── Interval buttons ── */
        document.getElementById('intervals').addEventListener('click', function (e) {
            if (e.target.tagName !== 'BUTTON') return;

            document.querySelectorAll('.intervals button').forEach(function (b) {
                b.classList.remove('active');
            });
            e.target.classList.add('active');

            currentInterval = e.target.dataset.tv;
            if (tvReady) {
                createChart(currentInterval);
            }
        });

        /* ── Load tv.js for Advanced Chart ── */
        var script = document.createElement('script');
        script.src = 'https://s3.tradingview.com/tv.js';
        script.onload = function () {
            tvReady = true;
            createChart(currentInterval);
        };
        script.onerror = function () {
            document.getElementById('chartLoading').innerHTML =
                '<span style="color:#6b7080;">TradingView를 불러올 수 없습니다.<br>인터넷 연결을 확인하세요.</span>';
        };
        document.head.appendChild(script);
    })();
    </script>
</body>
</html>
